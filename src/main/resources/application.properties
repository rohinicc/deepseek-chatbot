# ─────────────────────────────────────────────────────────────
#  AI Coder — application.properties (local development)
# ─────────────────────────────────────────────────────────────

# ── Application ───────────────────────────────────────────────
spring.application.name=deepseek-chatbot

# ── Server ────────────────────────────────────────────────────
server.port=8080
server.address=0.0.0.0

# ── Ollama ────────────────────────────────────────────────────
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=deepseek-coder:latest
spring.ai.ollama.chat.options.temperature=0.3
spring.ai.ollama.chat.options.num-predict=1024
spring.ai.ollama.chat.options.num-ctx=4096
spring.ai.ollama.chat.options.repeat-penalty=1.1

# ── MySQL ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/ai_coder_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Redis ─────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── Chat history TTL ──────────────────────────────────────────
app.chat.ttl-hours=24

# ── Thymeleaf ─────────────────────────────────────────────────
spring.thymeleaf.cache=false

# ── Session ───────────────────────────────────────────────────
server.servlet.session.timeout=30m

# ── Logging ───────────────────────────────────────────────────
logging.level.org.springframework.ai=WARN
logging.level.org.springframework.web=WARN