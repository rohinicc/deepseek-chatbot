# ─────────────────────────────────────────────────────────────
#  AI Coder — application.properties
# ─────────────────────────────────────────────────────────────

# ── Application ───────────────────────────────────────────────
spring.application.name=deepseek-chatbot

# ── Server ────────────────────────────────────────────────────
server.port=8080
server.address=0.0.0.0

# ── Ollama ────────────────────────────────────────────────────
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=deepseek-coder:latest
spring.ai.ollama.chat.options.temperature=0.7

# ── MySQL ─────────────────────────────────────────────────────
# FIX: added allowPublicKeyRetrieval=true for MySQL 8 caching_sha2_password auth
spring.datasource.url=jdbc:mysql://localhost:3306/ai_coder_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# NOTE: dialect line removed — MySQL 8 auto-detects it, no need to set manually

# ── Redis ─────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
# spring.data.redis.password=YOUR_REDIS_PASSWORD

# ── Chat history TTL ──────────────────────────────────────────
app.chat.ttl-hours=24

# ── Thymeleaf ─────────────────────────────────────────────────
spring.thymeleaf.cache=false

# ── Session ───────────────────────────────────────────────────
server.servlet.session.timeout=30m

# ── Logging ───────────────────────────────────────────────────
logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.web=DEBUG