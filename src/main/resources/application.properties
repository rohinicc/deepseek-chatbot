# ─────────────────────────────────────────────────────────────
#  AI Coder — application.properties
#  Works for both local dev and Docker/AWS automatically.
#  Docker sets env variables → those are used.
#  No Docker → falls back to localhost defaults.
# ─────────────────────────────────────────────────────────────

# ── Application ───────────────────────────────────────────────
spring.application.name=deepseek-chatbot

# ── Server ────────────────────────────────────────────────────
server.port=8080
server.address=0.0.0.0

# ── Ollama ────────────────────────────────────────────────────
# Local dev  → http://localhost:11434
# Docker/AWS → set SPRING_AI_OLLAMA_BASE_URL in .env
spring.ai.ollama.base-url=${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.options.model=deepseek-coder:latest
spring.ai.ollama.chat.options.temperature=0.7
spring.ai.ollama.chat.options.num-predict=512
spring.ai.ollama.chat.options.num-ctx=2048

# ── MySQL ─────────────────────────────────────────────────────
# Local dev  → localhost:3306
# Docker/AWS → service name "mysql" (set by docker-compose.yml)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ai_coder_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Redis ─────────────────────────────────────────────────────
# Local dev  → localhost
# Docker/AWS → service name "redis" (set by docker-compose.yml)
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# ── Chat history TTL ──────────────────────────────────────────
app.chat.ttl-hours=24

# ── Thymeleaf ─────────────────────────────────────────────────
spring.thymeleaf.cache=false

# ── Session ───────────────────────────────────────────────────
server.servlet.session.timeout=30m

# ── Logging ───────────────────────────────────────────────────
logging.level.org.springframework.ai=WARN
logging.level.org.springframework.web=WARN