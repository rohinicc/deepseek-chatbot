# ─────────────────────────────────────────────────────────────
#  AI Coder — application.properties
# ─────────────────────────────────────────────────────────────

spring.application.name=deepseek-chatbot

# ── Server ────────────────────────────────────────────────────
server.port=8080
server.address=0.0.0.0

# ── ROOT CAUSE OF "FORBIDDEN" #3 ──────────────────────────────
# ngrok adds X-Forwarded-Proto, X-Forwarded-Host, X-Forwarded-For
# to every proxied request. Without this line, Spring Boot IGNORES
# those headers and sees the raw internal address (localhost:8080).
# Spring Security then compares the CSRF Origin against localhost
# instead of the ngrok URL — mismatch → 403 on every POST.
# "framework" = Spring MVC processes the forwarded headers itself.
server.forward-headers-strategy=framework

# ── Ollama ────────────────────────────────────────────────────
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=deepseek-coder:latest
spring.ai.ollama.chat.options.temperature=0.3
spring.ai.ollama.chat.options.num-predict=1024
spring.ai.ollama.chat.options.num-ctx=4096
spring.ai.ollama.chat.options.repeat-penalty=1.1

# ── MySQL ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/ai_coder_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Redis ─────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── Chat history TTL ──────────────────────────────────────────
app.chat.ttl-hours=24

# ── Thymeleaf ─────────────────────────────────────────────────
spring.thymeleaf.cache=false

# ── Session ───────────────────────────────────────────────────
server.servlet.session.timeout=15m

# ── Logging ───────────────────────────────────────────────────
logging.level.org.springframework.ai=WARN
logging.level.org.springframework.web=WARN

# ── Actuator / Monitoring ─────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.endpoint.health.show-details=always