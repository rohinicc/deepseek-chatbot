<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coder</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════
           DESIGN TOKENS — light terminal, IBM Plex
           Shared across all 4 pages
        ═══════════════════════════════════════════════ */
        :root {
            --bg:          #f5f4f0;
            --bg2:         #edecea;
            --surface:     #ffffff;
            --surface2:    #f0eeeb;
            --border:      #dddbd4;
            --border-hi:   #c8c6be;
            --ink:         #1a1a1a;
            --ink2:        #6b6b63;
            --ink3:        #9e9d96;
            --accent:      #2563eb;
            --accent-l:    #eff4ff;
            --accent-b:    #bfdbfe;
            --success:     #16a34a;
            --danger:      #dc2626;
            --glow:        0 0 0 3px rgba(37,99,235,0.10);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--ink);
            font-family: 'IBM Plex Mono', monospace;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle dot grid — light version */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.45;
            pointer-events: none; z-index: 0;
        }

        /* Scanline sweep — light */
        body::after {
            content: '';
            position: fixed; left: 0; right: 0; top: 0; height: 80px;
            background: linear-gradient(transparent, rgba(37,99,235,0.02), transparent);
            animation: scanline 9s linear infinite;
            pointer-events: none; z-index: 0;
        }

        @keyframes fadeUp  { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:.35} }
        @keyframes blink   { 0%,100%{opacity:1} 50%{opacity:0} }
        @keyframes floatY  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
        @keyframes scanline{ 0%{transform:translateY(-100%)} 100%{transform:translateY(100vh)} }

        /* ════════════════════════════════
           SHARED TOPBAR
        ════════════════════════════════ */
        .topbar {
            position: fixed; top: 0; left: 0; right: 0; height: 52px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 24px;
            z-index: 100;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .brand-mark {
            width: 28px; height: 28px; border-radius: 6px;
            background: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(37,99,235,0.25);
        }
        .brand-name {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.88rem; font-weight: 600;
            color: var(--ink); letter-spacing: 0.02em;
        }
        .topbar-right {
            margin-left: auto; display: flex; align-items: center; gap: 8px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem; color: var(--ink3);
        }
        .status-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--success); animation: pulse 2s infinite;
        }

        /* ════════════════════════════════
           PAGE
        ════════════════════════════════ */
        .page {
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 80px 16px 40px;
            position: relative; z-index: 1;
        }

        /* ── Terminal card ── */
        .terminal-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            max-width: 480px; width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
            animation: fadeUp 0.4s ease both;
            overflow: hidden;
        }

        /* Terminal title bar */
        .t-bar {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex; align-items: center; gap: 7px;
        }
        .t-dot { width: 11px; height: 11px; border-radius: 50%; }
        .t-dot.r { background: #ef4444; }
        .t-dot.y { background: #f59e0b; }
        .t-dot.g { background: #22c55e; }
        .t-bar-title {
            margin-left: auto;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.62rem; color: var(--ink3);
        }

        /* Card body */
        .card-body { padding: 36px 36px 32px; text-align: center; }

        /* Floating icon */
        .icon-wrap {
            width: 64px; height: 64px; border-radius: 14px;
            background: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; margin: 0 auto 24px;
            box-shadow: 0 4px 20px rgba(37,99,235,0.25);
            animation: floatY 3s ease-in-out infinite;
        }

        /* Prompt line */
        .prompt-line {
            display: inline-flex; align-items: center; gap: 6px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem; color: var(--accent);
            letter-spacing: 0.06em; margin-bottom: 14px;
        }
        .prompt-line::before { content: '❯'; font-size: 0.7rem; }

        h1 {
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 1.85rem; font-weight: 700;
            color: var(--ink); letter-spacing: -0.03em;
            line-height: 1.2; margin-bottom: 12px;
        }
        h1 span { color: var(--accent); }
        .cursor {
            display: inline-block; width: 2px; height: 0.88em;
            background: var(--accent); vertical-align: middle;
            margin-left: 2px; animation: blink 1s infinite;
        }

        .subtitle {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem; color: var(--ink2);
            line-height: 1.75; margin-bottom: 32px;
        }

        /* ── Shared buttons ── */
        .btn-stack { display: flex; flex-direction: column; gap: 9px; }

        .btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 11px 20px; border-radius: 7px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem; font-weight: 500;
            text-decoration: none; border: none; cursor: pointer;
            transition: all 0.15s; letter-spacing: 0.02em;
        }
        .btn-primary {
            background: var(--accent); color: #fff;
            box-shadow: 0 2px 10px rgba(37,99,235,0.22);
        }
        .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(37,99,235,0.3); }

        .btn-ghost {
            background: transparent; color: var(--ink2);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-l); }

        .btn-arrow { transition: transform 0.2s; }
        .btn:hover .btn-arrow { transform: translateX(4px); }

        /* Flow indicator */
        .flow-hint {
            margin-top: 24px; padding-top: 20px;
            border-top: 1px solid var(--border);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.62rem; color: var(--ink3);
            display: flex; align-items: center; justify-content: center;
            gap: 6px; flex-wrap: wrap;
        }
        .flow-step {
            color: var(--ink2);
            padding: 2px 8px; border-radius: 4px;
            background: var(--bg2); border: 1px solid var(--border);
        }
        .flow-step.current {
            color: var(--accent); border-color: var(--accent-b);
            background: var(--accent-l);
        }
        .flow-arrow { color: var(--ink3); }

        /* Card footer */
        .card-foot {
            padding: 12px 16px;
            background: var(--bg2); border-top: 1px solid var(--border);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.6rem; color: var(--ink3);
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .card-foot::before { content: '#'; color: var(--accent); }
    </style>
</head>
<body>

    <div class="topbar">
        <a href="/welcome" class="brand">
            <div class="brand-mark">🤖</div>
            <span class="brand-name">ai-coder</span>
        </a>
        <div class="topbar-right">
            <span class="status-dot"></span>
            ready
        </div>
    </div>

    <div class="page">
        <div class="terminal-card">

            <div class="t-bar">
                <span class="t-dot r"></span>
                <span class="t-dot y"></span>
                <span class="t-dot g"></span>
                <span class="t-bar-title">welcome — ai-coder</span>
            </div>

            <div class="card-body">

                <div class="icon-wrap">🤖</div>

                <div class="prompt-line">ai-coder init</div>

                <h1>Welcome to <span>AI</span> Coder<span class="cursor"></span></h1>

                <p class="subtitle">
                    Your intelligent coding assistant.<br>
                    Write, debug, explain and review code — instantly.
                </p>

                <div class="btn-stack">
                    <a href="/login"  class="btn btn-primary">./sign-in <span class="btn-arrow">→</span></a>
                    <a href="/signup" class="btn btn-ghost">./create-account <span class="btn-arrow">→</span></a>
                </div>

                <!-- Page flow indicator -->
                <div class="flow-hint">
                    <span class="flow-step current">welcome</span>
                    <span class="flow-arrow">→</span>
                    <span class="flow-step">login</span>
                    <span class="flow-arrow">→</span>
                    <span class="flow-step">chat</span>
                </div>

            </div>

            <div class="card-foot">Your personal AI coding assistant</div>

        </div>
    </div>

</body>
</html>
