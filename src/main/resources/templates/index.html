<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coder</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #f5f4f0;
            --bg2:       #edecea;
            --surface:   #ffffff;
            --surface2:  #f0eeeb;
            --border:    #dddbd4;
            --ink:       #1a1a1a;
            --ink2:      #6b6b63;
            --ink3:      #9e9d96;
            --accent:    #2563eb;
            --accent-l:  #eff4ff;
            --accent-b:  #bfdbfe;
            --success:   #16a34a;
            --danger:    #dc2626;
            --glow:      0 0 0 3px rgba(37,99,235,0.10);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%; background: var(--bg); color: var(--ink);
            font-family: 'IBM Plex Mono', monospace;
            -webkit-font-smoothing: antialiased; overflow: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px),
                              linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0.45; pointer-events: none; z-index: 0;
        }

        @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:.35} }
        @keyframes bounce  { 0%,60%,100%{transform:translateY(0);opacity:.35} 30%{transform:translateY(-5px);opacity:1} }
        @keyframes fadeUp  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        @keyframes floatY  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

        .app {
            display: grid; grid-template-rows: 52px 1fr auto;
            height: 100vh; max-width: 860px;
            margin: 0 auto; padding: 0 16px;
            position: relative; z-index: 1;
        }

        header {
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .brand      { display: flex; align-items: center; gap: 10px; }
        .brand-mark { width: 28px; height: 28px; border-radius: 6px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 2px 8px rgba(37,99,235,0.25); }
        .brand-name { font-size: 0.88rem; font-weight: 600; color: var(--ink); letter-spacing: 0.02em; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .h-status { display: flex; align-items: center; gap: 5px; font-size: 0.65rem; color: var(--ink3); }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
        .h-user   { display: flex; align-items: center; gap: 6px; font-size: 0.65rem; color: var(--ink2); }
        .h-avatar { width: 22px; height: 22px; border-radius: 5px; background: var(--accent-l); border: 1px solid var(--accent-b); display: flex; align-items: center; justify-content: center; font-size: 11px; }
        .h-btn {
            background: none; border: 1px solid var(--border); color: var(--ink3);
            padding: 4px 10px; border-radius: 5px;
            font-size: 0.65rem; font-family: 'IBM Plex Mono', monospace;
            cursor: pointer; transition: all 0.15s;
            text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
        }
        .h-btn:hover       { border-color: var(--accent); color: var(--accent); }
        .h-btn.clear:hover { border-color: var(--danger);  color: var(--danger); }

        .chat-area {
            overflow-y: auto; padding: 24px 0;
            display: flex; flex-direction: column; gap: 18px;
            scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }

        .welcome {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%; gap: 14px; text-align: center;
            animation: fadeUp 0.35s ease both;
        }
        .welcome-icon {
            width: 60px; height: 60px; border-radius: 14px; background: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; margin-bottom: 4px;
            box-shadow: 0 4px 16px rgba(37,99,235,0.22);
            animation: floatY 3s ease-in-out infinite;
        }
        .welcome h2 { font-family: 'IBM Plex Sans', sans-serif; font-size: 1.15rem; font-weight: 600; color: var(--ink); }
        .welcome p  { font-size: 0.72rem; color: var(--ink2); max-width: 340px; line-height: 1.7; }
        .chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 4px; }
        .chip {
            background: var(--surface); border: 1px solid var(--border);
            padding: 6px 12px; border-radius: 6px;
            font-size: 0.68rem; cursor: pointer; color: var(--ink2); transition: all 0.15s;
        }
        .chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-l); }

        .message { display: flex; gap: 10px; animation: fadeUp 0.2s ease both; }
        .message.user { flex-direction: row-reverse; }
        .avatar {
            width: 26px; height: 26px; border-radius: 6px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; margin-top: 2px;
        }
        .message.user .avatar      { background: var(--accent-l); border: 1px solid var(--accent-b); }
        .message.assistant .avatar { background: var(--surface2); border: 1px solid var(--border); }

        /* ── OVERFLOW FIX — key change ── */
        .bubble-wrap {
            max-width: 76%;
            min-width: 0;        /* allows flex child to shrink below content size */
        }
        .message.user .bubble-wrap { display: flex; flex-direction: column; align-items: flex-end; }

        .bubble {
            border-radius: 8px; padding: 10px 14px;
            font-size: 0.82rem; line-height: 1.7;
            word-break: break-word;   /* breaks long words/URLs that would overflow */
            overflow-wrap: anywhere;  /* wraps at any character if necessary */
            min-width: 0;
        }
        .message.user .bubble {
            background: var(--accent); color: #fff;
            border-top-right-radius: 2px;
            box-shadow: 0 2px 8px rgba(37,99,235,0.18);
        }
        .message.assistant .bubble {
            background: var(--surface); color: var(--ink);
            border: 1px solid var(--border); border-top-left-radius: 2px;
            font-family: 'IBM Plex Sans', sans-serif;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .meta { font-size: 0.58rem; color: var(--ink3); margin-top: 4px; padding: 0 2px; }

        /* Code blocks scroll horizontally — never push bubble wider */
        .bubble pre {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 6px; padding: 12px; margin: 8px 0;
            overflow-x: auto;          /* horizontal scroll for long code lines */
            max-width: 100%;           /* never wider than bubble */
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.78rem; line-height: 1.65; color: var(--ink);
            white-space: pre;          /* preserve code formatting */
        }
        .bubble code:not(pre code) {
            background: var(--accent-l); border: 1px solid var(--accent-b);
            padding: 1px 5px; border-radius: 4px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.82em; color: var(--accent);
            word-break: break-word;
        }
        .bubble p { margin-bottom: 6px; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble strong { font-weight: 600; }
        .bubble ol, .bubble ul { padding-left: 18px; margin: 6px 0; }
        .bubble li { margin-bottom: 3px; }

        .typing {
            display: inline-flex; align-items: center; gap: 4px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; border-top-left-radius: 2px;
            padding: 11px 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .typing-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--ink3); animation: bounce 1.2s infinite; }
        .typing-dot:nth-child(2){animation-delay:.2s}
        .typing-dot:nth-child(3){animation-delay:.4s}

        .input-area { padding: 12px 0 18px; border-top: 1px solid var(--border); }
        .input-wrapper {
            display: flex; align-items: flex-end; gap: 8px;
            background: var(--surface); border: 1.5px solid var(--border);
            border-radius: 8px; padding: 8px 8px 8px 14px;
            transition: border-color 0.15s, box-shadow 0.15s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .input-wrapper:focus-within { border-color: var(--accent); box-shadow: var(--glow); }
        .input-ps { font-size: 0.8rem; color: var(--accent); user-select: none; flex-shrink: 0; margin-bottom: 2px; }
        #userInput {
            flex: 1; background: transparent; border: none; outline: none;
            color: var(--ink); font-family: 'IBM Plex Mono', monospace;
            font-size: 0.82rem; resize: none;
            min-height: 22px; max-height: 130px; line-height: 1.55;
        }
        #userInput::placeholder { color: var(--ink3); }
        .btn-send {
            width: 30px; height: 30px; border-radius: 6px;
            background: var(--accent); border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; color: #fff; font-size: 13px;
            transition: all 0.15s; box-shadow: 0 2px 8px rgba(37,99,235,0.22);
        }
        .btn-send:hover    { opacity: 0.88; transform: scale(1.05); }
        .btn-send:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
        .input-hint { font-size: 0.58rem; color: var(--ink3); text-align: center; margin-top: 7px; }
    </style>
</head>
<body>
<div class="app">
    <header>
        <div class="brand">
            <div class="brand-mark">🤖</div>
            <span class="brand-name">ai-coder</span>
        </div>
        <div class="header-right">
            <div class="h-status"><span class="status-dot"></span>ready</div>
            <div class="h-user">
                <div class="h-avatar">👤</div>
                <span th:text="${username}">user</span>
            </div>
            <button class="h-btn clear" onclick="clearChat()">⌫ clear</button>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="h-btn">↩ logout</button>
            </form>
        </div>
    </header>

    <div class="chat-area" id="chatArea">
        <div class="welcome" id="welcome" th:if="${messages == null or messages.isEmpty()}">
            <div class="welcome-icon">💻</div>
            <h2 th:text="'Hello, ' + ${username} + '! What can I code for you?'">What can I code for you?</h2>
            <p>Ask anything — algorithms, debugging, architecture, Spring Boot, and more.</p>
            <div class="chips">
                <span class="chip" onclick="sendSuggestion(this)">REST API in Spring Boot</span>
                <span class="chip" onclick="sendSuggestion(this)">async/await in JavaScript</span>
                <span class="chip" onclick="sendSuggestion(this)">Binary search in Java</span>
                <span class="chip" onclick="sendSuggestion(this)">SQL query optimisation</span>
            </div>
        </div>
        <th:block th:each="msg : ${messages}">
            <div th:class="'message ' + ${msg.role}">
                <div class="avatar" th:text="${msg.role == 'user' ? '👤' : '🤖'}"></div>
                <div class="bubble-wrap">
                    <div class="bubble">
                        <span class="raw-content" style="display:none" th:text="${msg.content}"></span>
                    </div>
                    <div class="meta" th:text="${msg.timestamp}"></div>
                </div>
            </div>
        </th:block>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <span class="input-ps">❯</span>
            <textarea id="userInput" rows="1"
                placeholder="ask ai-coder anything…"
                onkeydown="handleKey(event)"
                oninput="autoResize(this)"></textarea>
            <button class="btn-send" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
        <div class="input-hint">enter to send &nbsp;·&nbsp; shift+enter for new line</div>
    </div>
</div>

<script>
    function renderMarkdown(raw) {
        let t = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,l,c) => `<pre><code>${c.trim()}</code></pre>`);
        t = t.replace(/`([^`\n]+)`/g, '<code>$1</code>');
        t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        t = t.replace(/\*(.+?)\*/g,     '<em>$1</em>');
        t = t.replace(/^(\d+)\.\s+(.+)$/gm, '<li>$2</li>');
        t = t.replace(/^[-•]\s+(.+)$/gm, '<li>$1</li>');
        t = t.split(/\n{2,}/).map(p => {
            p = p.trim(); if(!p) return '';
            if(p.startsWith('<pre')||p.startsWith('<li')) return p;
            return `<p>${p.replace(/\n/g,'<br>')}</p>`;
        }).join('');
        return t;
    }
    document.querySelectorAll('.raw-content').forEach(s => {
        s.closest('.bubble').innerHTML = renderMarkdown(s.textContent);
    });
    function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function getCsrf() {
        const m = document.cookie.match('(^|;)\\s*XSRF-TOKEN\\s*=\\s*([^;]+)');
        return m ? decodeURIComponent(m.pop()) : '';
    }
    function appendMessage(role, content, time) {
        document.getElementById('welcome')?.remove();
        const ca = document.getElementById('chatArea');
        const d  = document.createElement('div');
        d.className = `message ${role}`;
        d.innerHTML = `
            <div class="avatar">${role==='user'?'👤':'🤖'}</div>
            <div class="bubble-wrap">
                <div class="bubble">${role==='assistant'?renderMarkdown(content):`<p>${esc(content)}</p>`}</div>
                <div class="meta">${time}</div>
            </div>`;
        ca.appendChild(d); ca.scrollTop = ca.scrollHeight;
    }
    function showTyping() {
        const ca = document.getElementById('chatArea');
        const d  = document.createElement('div');
        d.className = 'message assistant'; d.id = 'typing';
        d.innerHTML = `<div class="avatar">🤖</div><div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
        ca.appendChild(d); ca.scrollTop = ca.scrollHeight;
    }
    function removeTyping(){ document.getElementById('typing')?.remove(); }
    async function sendMessage() {
        const inp = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');
        const msg = inp.value.trim();
        if (!msg || btn.disabled) return;
        btn.disabled = true; inp.value = ''; inp.style.height = 'auto';
        const time = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
        appendMessage('user', msg, time);
        showTyping();
        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-XSRF-TOKEN': getCsrf() },
                body: JSON.stringify({ message: msg })
            });
            const data = await res.json();
            removeTyping();
            appendMessage('assistant', data.error ? `⚠️ ${data.error}` : data.response, data.time || time);
        } catch {
            removeTyping();
            appendMessage('assistant', '⚠️ Could not reach the AI. Please try again.', time);
        } finally {
            btn.disabled = false; inp.focus();
        }
    }
    function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
    function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,130)+'px'; }
    function sendSuggestion(el){ document.getElementById('userInput').value=el.textContent.trim(); sendMessage(); }
    async function clearChat() {
        await fetch('/clear', { method: 'POST', headers: { 'X-XSRF-TOKEN': getCsrf() } });
        document.getElementById('chatArea').innerHTML = `
            <div class="welcome" id="welcome">
                <div class="welcome-icon">💻</div>
                <h2>What can I code for you?</h2>
                <p>Ask anything — algorithms, debugging, architecture, Spring Boot, and more.</p>
                <div class="chips">
                    <span class="chip" onclick="sendSuggestion(this)">REST API in Spring Boot</span>
                    <span class="chip" onclick="sendSuggestion(this)">async/await in JavaScript</span>
                    <span class="chip" onclick="sendSuggestion(this)">Binary search in Java</span>
                    <span class="chip" onclick="sendSuggestion(this)">SQL query optimisation</span>
                </div>
            </div>`;
    }
    document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
    document.getElementById('userInput').focus();
</script>
</body>
</html>
