<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coder</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #f5f4f0;
            --surface:   #ffffff;
            --surface2:  #f0eeeb;
            --border:    #dddbd4;
            --ink:       #1a1a1a;
            --ink2:      #6b6b63;
            --ink3:      #9e9d96;
            --accent:    #2563eb;
            --accent-l:  #eff4ff;
            --accent-b:  #bfdbfe;
            --success:   #16a34a;
            --danger:    #dc2626;
            --glow:      0 0 0 3px rgba(37,99,235,0.10);
            --c-bg:      #1e1e2e;
            --c-bg2:     #181825;
            --c-border:  #313244;
            --c-text:    #cdd6f4;
            --c-sub:     #6c7086;
            --c-fn:      #89b4fa;
            --c-str:     #a6e3a1;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%; background: var(--bg); color: var(--ink);
            font-family: 'IBM Plex Mono', monospace;
            -webkit-font-smoothing: antialiased; overflow: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px),
                              linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0.45; pointer-events: none; z-index: 0;
        }
        @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:.35} }
        @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.35} 30%{transform:translateY(-5px);opacity:1} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        @keyframes floatY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

        .app {
            display: grid; grid-template-rows: 52px 1fr auto;
            height: 100vh; max-width: 900px;
            margin: 0 auto; padding: 0 16px;
            position: relative; z-index: 1;
        }

        /* ── Header ── */
        header {
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .brand      { display: flex; align-items: center; gap: 10px; }
        .brand-mark { width: 28px; height: 28px; border-radius: 6px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 2px 8px rgba(37,99,235,0.25); }
        .brand-name { font-size: 0.88rem; font-weight: 600; color: var(--ink); letter-spacing: 0.02em; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .h-status { display: flex; align-items: center; gap: 5px; font-size: 0.65rem; color: var(--ink3); }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
        .h-user   { display: flex; align-items: center; gap: 6px; font-size: 0.65rem; color: var(--ink2); }
        .h-avatar { width: 22px; height: 22px; border-radius: 5px; background: var(--accent-l); border: 1px solid var(--accent-b); display: flex; align-items: center; justify-content: center; font-size: 11px; }
        .h-btn {
            background: none; border: 1px solid var(--border); color: var(--ink3);
            padding: 4px 10px; border-radius: 5px;
            font-size: 0.65rem; font-family: 'IBM Plex Mono', monospace;
            cursor: pointer; transition: all 0.15s;
            text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
        }
        .h-btn:hover       { border-color: var(--accent); color: var(--accent); }
        .h-btn.clear:hover { border-color: var(--danger);  color: var(--danger); }

        /* ── Chat area ── */
        .chat-area {
            overflow-y: auto; padding: 24px 0;
            display: flex; flex-direction: column; gap: 18px;
            scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }

        /* ── Welcome ── */
        .welcome {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100%; gap: 14px; text-align: center;
            animation: fadeUp 0.35s ease both;
        }
        .welcome-icon {
            width: 60px; height: 60px; border-radius: 14px; background: var(--accent);
            display: flex; align-items: center; justify-content: center; font-size: 26px;
            margin-bottom: 4px; box-shadow: 0 4px 16px rgba(37,99,235,0.22);
            animation: floatY 3s ease-in-out infinite;
        }
        .welcome h2 { font-family: 'IBM Plex Sans', sans-serif; font-size: 1.15rem; font-weight: 600; }
        .welcome p  { font-size: 0.72rem; color: var(--ink2); max-width: 340px; line-height: 1.7; }
        .chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 4px; }
        .chip {
            background: var(--surface); border: 1px solid var(--border);
            padding: 6px 12px; border-radius: 6px;
            font-size: 0.68rem; cursor: pointer; color: var(--ink2); transition: all 0.15s;
        }
        .chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-l); }

        /* ── Messages ── */
        .message { display: flex; gap: 10px; animation: fadeUp 0.2s ease both; }
        .message.user { flex-direction: row-reverse; }
        .avatar {
            width: 26px; height: 26px; border-radius: 6px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; margin-top: 2px;
        }
        .message.user .avatar      { background: var(--accent-l); border: 1px solid var(--accent-b); }
        .message.assistant .avatar { background: var(--surface2); border: 1px solid var(--border); }

        .bubble-wrap { max-width: 82%; min-width: 0; }
        .message.user .bubble-wrap { display: flex; flex-direction: column; align-items: flex-end; }

        .bubble {
            border-radius: 8px; padding: 10px 14px;
            font-size: 0.82rem; line-height: 1.7;
            word-break: break-word; overflow-wrap: anywhere; min-width: 0;
        }
        .message.user .bubble {
            background: var(--accent); color: #fff;
            border-top-right-radius: 2px;
            box-shadow: 0 2px 8px rgba(37,99,235,0.18);
            font-family: 'IBM Plex Mono', monospace;
        }
        .message.assistant .bubble {
            background: var(--surface); color: var(--ink);
            border: 1px solid var(--border); border-top-left-radius: 2px;
            font-family: 'IBM Plex Sans', sans-serif;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .meta { font-size: 0.58rem; color: var(--ink3); margin-top: 4px; padding: 0 2px; }

        /* ── History date separator ── */
        .date-sep {
            display: flex; align-items: center; gap: 10px;
            font-size: 0.62rem; color: var(--ink3); margin: 4px 0;
        }
        .date-sep::before, .date-sep::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }

        /* ── Code block — dark theme with line numbers ── */
        .code-wrapper {
            margin: 10px 0; border-radius: 8px;
            overflow: hidden; border: 1px solid var(--c-border); width: 100%;
        }
        .code-header {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--c-bg2); padding: 7px 14px;
            font-size: 0.68rem; color: var(--c-sub);
            font-family: 'IBM Plex Mono', monospace;
            border-bottom: 1px solid var(--c-border);
        }
        .code-lang { color: var(--c-fn); font-weight: 500; }
        .copy-btn {
            background: var(--c-border); border: none; color: var(--c-text);
            padding: 3px 10px; border-radius: 4px; font-size: 0.65rem;
            cursor: pointer; font-family: 'IBM Plex Mono', monospace; transition: all 0.15s;
        }
        .copy-btn:hover  { background: #45475a; }
        .copy-btn.copied { background: #1e3a2f; color: var(--c-str); }

        .code-body { display: flex; background: var(--c-bg); overflow-x: auto; width: 100%; }
        .line-nums {
            padding: 14px 10px 14px 14px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.78rem; line-height: 1.7; color: var(--c-sub);
            text-align: right; user-select: none; flex-shrink: 0;
            border-right: 1px solid var(--c-border); min-width: 36px;
        }
        .bubble pre {
            background: transparent; padding: 14px 16px; margin: 0; flex: 1;
            font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem;
            line-height: 1.7; color: var(--c-text);
            white-space: pre; word-break: normal; overflow-wrap: normal; tab-size: 4;
        }
        .bubble pre code { background: none; border: none; padding: 0; color: inherit; font-size: inherit; }

        /* inline code */
        .bubble code:not(pre code) {
            background: var(--accent-l); border: 1px solid var(--accent-b);
            padding: 1px 5px; border-radius: 4px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.82em; color: var(--accent);
        }

        /* text formatting */
        .bubble p          { margin-bottom: 8px; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble strong     { font-weight: 600; }
        .bubble h3         { font-size: 0.9rem; font-weight: 600; margin: 12px 0 5px; }
        .bubble ol, .bubble ul { padding-left: 20px; margin: 6px 0; }
        .bubble li         { margin-bottom: 4px; line-height: 1.6; }
        .bubble hr         { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

        /* ── Typing indicator ── */
        .typing {
            display: inline-flex; align-items: center; gap: 4px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; border-top-left-radius: 2px;
            padding: 11px 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .typing-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--ink3); animation: bounce 1.2s infinite; }
        .typing-dot:nth-child(2){animation-delay:.2s}
        .typing-dot:nth-child(3){animation-delay:.4s}

        /* ── Input area ── */
        .input-area { padding: 12px 0 18px; border-top: 1px solid var(--border); }
        .input-wrapper {
            display: flex; align-items: flex-end; gap: 8px;
            background: var(--surface); border: 1.5px solid var(--border);
            border-radius: 8px; padding: 8px 8px 8px 14px;
            transition: border-color 0.15s, box-shadow 0.15s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .input-wrapper:focus-within { border-color: var(--accent); box-shadow: var(--glow); }
        .input-ps { font-size: 0.8rem; color: var(--accent); user-select: none; flex-shrink: 0; margin-bottom: 2px; }
        #userInput {
            flex: 1; background: transparent; border: none; outline: none;
            color: var(--ink); font-family: 'IBM Plex Mono', monospace;
            font-size: 0.82rem; resize: none;
            min-height: 22px; max-height: 130px; line-height: 1.55;
        }
        #userInput::placeholder { color: var(--ink3); }
        .btn-send {
            width: 30px; height: 30px; border-radius: 6px;
            background: var(--accent); border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; color: #fff; font-size: 13px;
            transition: all 0.15s; box-shadow: 0 2px 8px rgba(37,99,235,0.22);
        }
        .btn-send:hover    { opacity: 0.88; transform: scale(1.05); }
        .btn-send:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
        .input-hint { font-size: 0.58rem; color: var(--ink3); text-align: center; margin-top: 7px; }
    </style>
</head>
<body>
<div class="app">
    <header>
        <div class="brand">
            <div class="brand-mark">🤖</div>
            <span class="brand-name">ai-coder</span>
        </div>
        <div class="header-right">
            <div class="h-status"><span class="status-dot"></span>ready</div>
            <div class="h-user">
                <div class="h-avatar">👤</div>
                <span th:text="${username}">user</span>
            </div>
            <button class="h-btn clear" onclick="clearChat()">⌫ clear</button>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="h-btn">↩ logout</button>
            </form>
        </div>
    </header>

    <div class="chat-area" id="chatArea">

        <!-- ── Welcome screen (shown when no history) ── -->
        <div class="welcome" id="welcome" th:if="${messages == null or messages.isEmpty()}">
            <div class="welcome-icon">💻</div>
            <h2 th:text="'Hello, ' + ${username} + '! What can I code for you?'">What can I code for you?</h2>
            <p>Ask anything — algorithms, debugging, architecture, Spring Boot, and more.</p>
            <div class="chips">
                <span class="chip" onclick="sendSuggestion(this)">REST API in Spring Boot</span>
                <span class="chip" onclick="sendSuggestion(this)">async/await in JavaScript</span>
                <span class="chip" onclick="sendSuggestion(this)">Binary search in Java</span>
                <span class="chip" onclick="sendSuggestion(this)">SQL query optimisation</span>
            </div>
        </div>

        <!-- ── Chat history header (shown when history exists) ── -->
        <div th:if="${messages != null and !messages.isEmpty()}" class="date-sep">
            chat history
        </div>

        <!-- ── Render saved messages from Redis ── -->
        <th:block th:each="msg : ${messages}">
            <div th:class="'message ' + ${msg.role}">
                <div class="avatar" th:text="${msg.role == 'user' ? '👤' : '🤖'}"></div>
                <div class="bubble-wrap">
                    <div class="bubble">
                        <span class="raw-content" style="display:none" th:text="${msg.content}"></span>
                    </div>
                    <div class="meta" th:text="${msg.timestamp}"></div>
                </div>
            </div>
        </th:block>

        <!-- ── Separator between history and new messages ── -->
        <div th:if="${messages != null and !messages.isEmpty()}" class="date-sep" id="newMsgSep">
            new messages
        </div>

    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <span class="input-ps">❯</span>
            <textarea id="userInput" rows="1"
                placeholder="ask ai-coder anything…"
                onkeydown="handleKey(event)"
                oninput="autoResize(this)"></textarea>
            <button class="btn-send" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
        <div class="input-hint">enter to send &nbsp;·&nbsp; shift+enter for new line</div>
    </div>
</div>

<script>
    /* ── Build code block with line numbers + copy button ── */
    function buildCodeBlock(lang, rawCode) {
        /* fix model outputting multiple statements on one line */
        let code = rawCode
            .replace(/\r\n/g, '\n')
            .replace(/\r/g, '\n')
            .trim();

        const label = lang ? lang.toLowerCase() : 'code';
        const lines  = code.split('\n');
        const lineNums = lines.map((_,i) => i+1).join('\n');

        const escaped = code
            .replace(/&/g,'&amp;')
            .replace(/</g,'&lt;')
            .replace(/>/g,'&gt;');

        return `<div class="code-wrapper">
            <div class="code-header">
                <span class="code-lang">${label}</span>
                <button class="copy-btn" onclick="copyCode(this)">copy</button>
            </div>
            <div class="code-body">
                <div class="line-nums">${lineNums}</div>
                <pre><code>${escaped}</code></pre>
            </div>
        </div>`;
    }

    /* ── Render markdown to HTML ── */
    function renderMarkdown(raw) {
        if (!raw) return '';
        let t = raw;

        /* extract and replace code blocks first before any escaping */
        const codeBlocks = [];
        t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
            const idx = codeBlocks.length;
            codeBlocks.push(buildCodeBlock(lang, code));
            return `%%CODE_BLOCK_${idx}%%`;
        });

        /* now escape HTML in non-code text */
        t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

        /* inline formatting */
        t = t.replace(/`([^`\n]+)`/g, '<code>$1</code>');
        t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        t = t.replace(/\*(.+?)\*/g,     '<em>$1</em>');
        t = t.replace(/^#{3}\s+(.+)$/gm, '<h3>$1</h3>');
        t = t.replace(/^[-–—]{3,}$/gm,   '<hr>');
        t = t.replace(/^(\d+)\.\s+(.+)$/gm, '<li>$2</li>');
        t = t.replace(/^[-•*]\s+(.+)$/gm,   '<li>$1</li>');

        /* paragraphs */
        t = t.split(/\n{2,}/).map(p => {
            p = p.trim();
            if (!p) return '';
            if (/^%%CODE_BLOCK/.test(p))   return p;
            if (/^<(h3|hr|li)/.test(p))    return p;
            return `<p>${p.replace(/\n/g,'<br>')}</p>`;
        }).join('');

        /* restore code blocks */
        codeBlocks.forEach((block, i) => {
            t = t.replace(`%%CODE_BLOCK_${i}%%`, block);
        });

        return t;
    }

    /* ── Copy code to clipboard ── */
    function copyCode(btn) {
        if (!btn) return;
        const wrapper = btn.closest('.code-wrapper');
        if (!wrapper) return;
        const codeEl = wrapper.querySelector('code');
        if (!codeEl) return;
        navigator.clipboard.writeText(codeEl.innerText).then(() => {
            btn.textContent = 'copied!';
            btn.classList.add('copied');
            setTimeout(() => {
                if (btn) { btn.textContent = 'copy'; btn.classList.remove('copied'); }
            }, 2000);
        }).catch(() => {
            btn.textContent = 'error';
            setTimeout(() => { if (btn) btn.textContent = 'copy'; }, 2000);
        });
    }

    /* ── Render history messages on page load ── */
    document.querySelectorAll('.raw-content').forEach(s => {
        if (!s) return;
        const bubble  = s.closest('.bubble');
        if (!bubble) return;
        const message = bubble.closest('.message');
        if (!message) return;
        const isUser  = message.classList && message.classList.contains('user');
        if (!isUser) {
            bubble.innerHTML = renderMarkdown(s.textContent || '');
        } else {
            const txt = (s.textContent || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            bubble.innerHTML = `<p>${txt}</p>`;
        }
    });

    function getCsrf() {
        const m = document.cookie.match('(^|;)\\s*XSRF-TOKEN\\s*=\\s*([^;]+)');
        return m ? decodeURIComponent(m.pop()) : '';
    }

    function esc(t) {
        return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    /* ── Append a new message to the chat ── */
    function appendMessage(role, content, time) {
        document.getElementById('welcome')?.remove();
        document.getElementById('newMsgSep')?.remove();

        const ca = document.getElementById('chatArea');
        if (!ca) return;
        const d  = document.createElement('div');
        d.className = `message ${role}`;
        const html = role === 'assistant'
            ? renderMarkdown(content || '')
            : `<p>${esc(content || '')}</p>`;
        d.innerHTML = `
            <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
            <div class="bubble-wrap">
                <div class="bubble">${html}</div>
                <div class="meta">${time || ''}</div>
            </div>`;
        ca.appendChild(d);
        ca.scrollTop = ca.scrollHeight;
    }

    function showTyping() {
        const ca = document.getElementById('chatArea');
        if (!ca) return;
        const d  = document.createElement('div');
        d.className = 'message assistant'; d.id = 'typing';
        d.innerHTML = `<div class="avatar">🤖</div><div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
        ca.appendChild(d); ca.scrollTop = ca.scrollHeight;
    }
    function removeTyping() { document.getElementById('typing')?.remove(); }

    async function sendMessage() {
        const inp = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');
        if (!inp || !btn) return;
        const msg = inp.value.trim();
        if (!msg || btn.disabled) return;
        btn.disabled = true; inp.value = ''; inp.style.height = 'auto';
        const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        appendMessage('user', msg, time);
        showTyping();
        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-XSRF-TOKEN': getCsrf() },
                body: JSON.stringify({ message: msg })
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            removeTyping();
            appendMessage('assistant', data.error ? `⚠️ ${data.error}` : data.response, data.time || time);
        } catch (err) {
            removeTyping();
            appendMessage('assistant', '⚠️ Could not reach the AI. Please try again.', time);
        } finally {
            btn.disabled = false;
            inp?.focus();
        }
    }

    function handleKey(e)   { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
    function autoResize(el) { if (!el) return; el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,130)+'px'; }
    function sendSuggestion(el) {
        if (!el) return;
        const inp = document.getElementById('userInput');
        if (!inp) return;
        inp.value = el.textContent.trim();
        sendMessage();
    }

    async function clearChat() {
        await fetch('/clear', { method: 'POST', headers: { 'X-XSRF-TOKEN': getCsrf() } });
        const ca = document.getElementById('chatArea');
        if (!ca) return;
        ca.innerHTML = `
            <div class="welcome" id="welcome">
                <div class="welcome-icon">💻</div>
                <h2>What can I code for you?</h2>
                <p>Ask anything — algorithms, debugging, architecture, Spring Boot, and more.</p>
                <div class="chips">
                    <span class="chip" onclick="sendSuggestion(this)">REST API in Spring Boot</span>
                    <span class="chip" onclick="sendSuggestion(this)">async/await in JavaScript</span>
                    <span class="chip" onclick="sendSuggestion(this)">Binary search in Java</span>
                    <span class="chip" onclick="sendSuggestion(this)">SQL query optimisation</span>
                </div>
            </div>`;
    }

    /* scroll to bottom on load */
    const chatArea = document.getElementById('chatArea');
    if (chatArea) chatArea.scrollTop = chatArea.scrollHeight;
    const userInput = document.getElementById('userInput');
    if (userInput) userInput.focus();
</script>
</body>
</html>
